default:
  interruptible: true

workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - when: never

stages:
  - verify
  - bundle
  - package
  - announce
  - release

variables:
  GIT_DEPTH: "1"
  GIT_SUBMODULE_STRATEGY: none
  TNYMA_AI_REF: "main"
  TNYMA_AI_CHECKOUT_DIR: "$CI_PROJECT_DIR/.ci/tnyma-ai"
  SKIP_OPENCLAW_NPM_VERIFY: "0"

.setup_posix:
  before_script:
    - export PATH="$HOME/.local/bin:$HOME/bin:/opt/homebrew/bin:/usr/local/bin:$PATH"
    - |
      if ! command -v corepack >/dev/null 2>&1; then
        NVM_NODE_BIN="$(find "$HOME/.nvm/versions/node" -maxdepth 3 -type f -name node 2>/dev/null | sort | tail -n 1)"
        if [ -n "$NVM_NODE_BIN" ]; then
          export PATH="$(dirname "$NVM_NODE_BIN"):$PATH"
        fi
      fi
    - command -v node
    - command -v corepack
    - corepack enable
    - corepack prepare pnpm@10.31.0 --activate
    - pnpm install --frozen-lockfile
    - export TNYMA_AI_SOURCE_ROOT="${TNYMA_AI_SOURCE_ROOT:-$TNYMA_AI_CHECKOUT_DIR}"
    - node scripts/ci/prepare-tnyma-source.mjs

.setup_windows:
  before_script:
    - $env:Path = 'C:\Program Files\Git\cmd;C:\Program Files\Git\bin;' + $env:Path
    - where.exe git
    - corepack enable
    - corepack prepare pnpm@10.31.0 --activate
    - pnpm install --frozen-lockfile
    - if (-not $env:TNYMA_AI_SOURCE_ROOT) { $env:TNYMA_AI_SOURCE_ROOT = $env:TNYMA_AI_CHECKOUT_DIR }
    - node scripts/ci/prepare-tnyma-source.mjs

verify:installer:
  stage: verify
  extends: .setup_posix
  tags:
    - docker
  script:
    - node scripts/ci/verify-release-inputs.mjs
    - node scripts/ci/verify-openclaw-version.mjs
    - pnpm run typecheck
    - pnpm test
  after_script:
    - |
      export PATH="$HOME/.local/bin:$HOME/bin:/opt/homebrew/bin:/usr/local/bin:$PATH"
      if ! command -v node >/dev/null 2>&1; then
        NVM_NODE_BIN="$(find "$HOME/.nvm/versions/node" -maxdepth 3 -type f -name node 2>/dev/null | sort | tail -n 1)"
        if [ -n "$NVM_NODE_BIN" ]; then
          export PATH="$(dirname "$NVM_NODE_BIN"):$PATH"
        fi
      fi
      if [ "${CI_JOB_STATUS:-success}" != "success" ]; then
        node scripts/ci/notify-feishu.mjs build-failure || true
      fi

bundle:services:
  stage: bundle
  extends: .setup_posix
  tags:
    - docker
  script:
    - node scripts/ci/verify-openclaw-version.mjs
    - pnpm run bundle:tnyma-web-stack
    - node scripts/write-build-metadata.mjs
  after_script:
    - |
      export PATH="$HOME/.local/bin:$HOME/bin:/opt/homebrew/bin:/usr/local/bin:$PATH"
      if ! command -v node >/dev/null 2>&1; then
        NVM_NODE_BIN="$(find "$HOME/.nvm/versions/node" -maxdepth 3 -type f -name node 2>/dev/null | sort | tail -n 1)"
        if [ -n "$NVM_NODE_BIN" ]; then
          export PATH="$(dirname "$NVM_NODE_BIN"):$PATH"
        fi
      fi
      if [ "${CI_JOB_STATUS:-success}" != "success" ]; then
        node scripts/ci/notify-feishu.mjs build-failure || true
      fi
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - when: never

package:mac:
  stage: package
  extends: .setup_posix
  tags:
    - macos
  timeout: 3h
  script:
    - bash package-mac.sh
    - bash scripts/ci/verify-macos-notarization.sh
  after_script:
    - |
      export PATH="$HOME/.local/bin:$HOME/bin:/opt/homebrew/bin:/usr/local/bin:$PATH"
      if ! command -v node >/dev/null 2>&1; then
        NVM_NODE_BIN="$(find "$HOME/.nvm/versions/node" -maxdepth 3 -type f -name node 2>/dev/null | sort | tail -n 1)"
        if [ -n "$NVM_NODE_BIN" ]; then
          export PATH="$(dirname "$NVM_NODE_BIN"):$PATH"
        fi
      fi
      if [ "${CI_JOB_STATUS:-success}" != "success" ]; then
        node scripts/ci/notify-feishu.mjs build-failure || true
      fi
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - release/*.dmg
      - release/*.zip
      - release/*.blockmap
      - release/latest*.yml
      - build/build-metadata.json
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
    - when: never

package:win:
  stage: package
  extends: .setup_windows
  tags:
    - windows
  script:
    - pnpm run package:win
  after_script:
    - |
      if ($env:CI_JOB_STATUS -ne "success") {
        try {
          node scripts/ci/notify-feishu.mjs build-failure
        } catch {
          Write-Host $_
        }
      }
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - release/*.exe
      - release/*.blockmap
      - release/latest*.yml
      - build/build-metadata.json
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
    - when: never

package:linux:
  stage: package
  extends: .setup_posix
  tags:
    - linux
  script:
    - pnpm run package:linux
  after_script:
    - |
      export PATH="$HOME/.local/bin:$HOME/bin:/opt/homebrew/bin:/usr/local/bin:$PATH"
      if ! command -v node >/dev/null 2>&1; then
        NVM_NODE_BIN="$(find "$HOME/.nvm/versions/node" -maxdepth 3 -type f -name node 2>/dev/null | sort | tail -n 1)"
        if [ -n "$NVM_NODE_BIN" ]; then
          export PATH="$(dirname "$NVM_NODE_BIN"):$PATH"
        fi
      fi
      if [ "${CI_JOB_STATUS:-success}" != "success" ]; then
        node scripts/ci/notify-feishu.mjs build-failure || true
      fi
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - release/*.AppImage
      - release/*.deb
      - release/*.rpm
      - release/latest*.yml
      - build/build-metadata.json
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
    - when: never

release:gitlab:
  stage: release
  image: node:20-bookworm
  tags:
    - docker
  variables:
    GIT_DEPTH: "0"
  needs:
    - job: package:mac
      artifacts: true
    - job: package:win
      artifacts: true
    - job: package:linux
      artifacts: true
  script:
    - apt-get update
    - apt-get install -y --no-install-recommends git ca-certificates
    - node scripts/ci/publish-gitlab-release.mjs
  after_script:
    - |
      export PATH="$HOME/.local/bin:$HOME/bin:/opt/homebrew/bin:/usr/local/bin:$PATH"
      case "${CI_JOB_STATUS:-}" in
        success)
          node scripts/ci/notify-feishu.mjs release-success || true
          ;;
        failed|canceled)
          node scripts/ci/notify-feishu.mjs release-failure || true
          ;;
      esac
  artifacts:
    when: always
    expire_in: 180 days
    paths:
      - build/release-notes.md
  rules:
    - if: $CI_COMMIT_TAG
    - when: never
