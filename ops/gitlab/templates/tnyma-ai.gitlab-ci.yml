default:
  interruptible: true

workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - when: never

stages:
  - verify
  - build

variables:
  GIT_DEPTH: "1"
  GIT_SUBMODULE_STRATEGY: none

.setup:
  before_script:
    - corepack enable
    - corepack prepare pnpm@10.31.0 --activate
    - pnpm install --frozen-lockfile

verify:tnyma-ai:
  stage: verify
  extends: .setup
  tags:
    - docker
  script:
    - pnpm run typecheck
    - pnpm test

build:web:standalone:
  stage: build
  extends: .setup
  tags:
    - docker
  script:
    - pnpm run build:web
  artifacts:
    when: always
    paths:
      - apps/web/.next/standalone/
      - apps/web/.next/static/
      - apps/web/public/
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - when: never
